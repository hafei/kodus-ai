id: p0
description: |
    P0 gates that block every release. Covers the core onboarding wiring
    (webhook auto-registration per provider), code-review on all four
    providers in both targets, license attribution gates, and the
    kody-rules apply flow on the primary provider. Run before promoting
    any RC tag to client-visible.

# Order matters: onboarding-webhook-registration runs first per cell. If
# the provider's webhook isn't registered after onboarding, the rest of
# the scenarios are guaranteed to fail (events never reach Kodus) and
# would just waste pipeline budget. Keeping it first surfaces the real
# regression in ~30s instead of as a downstream 10-min timeout.
scenarios:
    - onboarding-webhook-registration
    - code-review-basic
    - kody-rules-create-and-apply
    - license-attribution
    # Per-seat gate: appliesTo restricts to self-hosted × github × license-paid
    # (one cell). Skipped automatically when SH_LICENSE_KEY_PATH (default
    # ~/.kodus-dev/license-seats1.jwt) isn't available — see run-matrix.ts.
    - per-seat-license-toggle

cells:
    # ---------- self-hosted ----------
    - target: self-hosted
      provider: github
      license: license-paid
    - target: self-hosted
      provider: gitlab
      license: license-paid
    - target: self-hosted
      provider: bitbucket
      license: license-paid
    - target: self-hosted
      provider: azure-devops
      license: license-paid
    - target: self-hosted
      provider: github
      license: license-free

    # ---------- cloud ----------
    - target: cloud
      provider: github
      license: paid
    - target: cloud
      provider: gitlab
      license: paid
    - target: cloud
      provider: bitbucket
      license: paid
    - target: cloud
      provider: azure-devops
      license: paid
    - target: cloud
      provider: github
      license: free
    - target: cloud
      provider: github
      license: trial
    # Community plan: post-trial tenant that configured its own LLM API
    # key (BYOK). Free in Stripe terms but reviews still work (with the
    # 10-rule limit). Distinct from `free` (= trial expired, no BYOK,
    # gate blocks).
    - target: cloud
      provider: github
      license: community-byok
